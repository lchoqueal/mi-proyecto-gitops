apiVersion: apps/v1
kind: Deployment
metadata:
  name: core-service-pedidos
  namespace: pedidos-env
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pedidos-api
  template:
    metadata:
      labels:
        app: pedidos-api
    spec:
      containers:
      - name: pedidos-api
        image: an7hony16/pedidos-api:v1.1.e830f5a
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: supabase-db-secrets
              key: DATABASE_URL
        - name: OTEL_SERVICE_NAME
          value: "pedidos-api"
        - name: OTEL_LOG_LEVEL
          value: "debug"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
