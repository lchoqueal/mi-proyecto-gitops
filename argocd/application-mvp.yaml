apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pedidos-mvp
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/lchoqueal/mi-proyecto-gitops.git
    targetRevision: HEAD
    path: k8s/desarrollo
  destination:
    server: https://kubernetes.default.svc
    namespace: pedidos-env
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
